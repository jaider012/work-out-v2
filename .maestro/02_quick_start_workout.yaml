# Quick Start flow: empty workout → add exercise → log a set → finish.
# Assumes the user is already signed in (run 01_sign_in.yaml first or on a
# pre-authenticated build).
appId: com.jaider012.work-out-v2
---
# Assumes the previous flow left the app signed in and foregrounded.
- assertVisible:
    id: "home-start-empty-workout"
- tapOn:
    id: "home-start-empty-workout"

# Active workout modal opens
- assertVisible:
    id: "active-workout-name"

# Rename the workout
- tapOn:
    id: "active-workout-name"
- eraseText: 50
- inputText: "Maestro Quick Start"
- hideKeyboard:
    optional: true

# Add an exercise
- tapOn:
    id: "active-workout-add-exercise"
- assertVisible:
    id: "exercise-picker-search"
- tapOn:
    id: "exercise-picker-search"
- inputText: "Bench Press"
- hideKeyboard:
    optional: true
- tapOn:
    id: "exercise-row-bench-press"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "exercise-picker-add"

# Log first set: 60 kg × 8 reps and tick it off
- assertVisible:
    id: "active-workout-finish"
- tapOn:
    id: "set-weight-we-\\d+-\\d+-0"
- eraseText: 5
- inputText: "60"
- hideKeyboard:
    optional: true
- tapOn:
    id: "set-reps-we-\\d+-\\d+-0"
- eraseText: 3
- inputText: "8"
- hideKeyboard:
    optional: true
- tapOn:
    id: "set-check-we-\\d+-\\d+-0"
    optional: true

# Finish workout → celebration screen
- tapOn:
    id: "active-workout-finish"
- extendedWaitUntil:
    visible:
      text: "Great work"
    timeout: 15000
