# Quick Start flow: empty workout → add exercise → log a set → finish.
# Assumes the user is already signed in (run 01_sign_in.yaml first or on a
# pre-authenticated build).
appId: ${APP_ID:-host.exp.Exponent}
---
- launchApp
- tapOn:
    text: "Workout"
    index: 0
- assertVisible:
    id: "workout-quick-start"
- tapOn:
    id: "workout-quick-start"

# Active workout modal opens
- assertVisible:
    id: "active-workout-name"

# Rename the workout
- tapOn:
    id: "active-workout-name"
- eraseText: 50
- inputText: "Maestro Quick Start"
- hideKeyboard

# Add an exercise
- tapOn:
    id: "active-workout-add-exercise"
- assertVisible:
    id: "exercise-picker-search"
- tapOn:
    id: "exercise-picker-search"
- inputText: "Bench Press"
- hideKeyboard
- tapOn:
    id: "exercise-row-bench-press"
- tapOn:
    id: "exercise-picker-add"

# Log first set: 60 kg × 8 reps and tick it off
- assertVisible:
    text: "Bench Press (Barbell)"
- tapOn:
    id: "set-weight-${output.we ?? 'we-0'}-0"
    optional: true
- tapOn:
    text: "0"
    index: 0
- inputText: "60"
- hideKeyboard
- tapOn:
    text: "0"
    index: 0
- inputText: "8"
- hideKeyboard
- tapOn:
    text: "✓"
    index: 0
    optional: true

# Finish workout
- tapOn:
    id: "active-workout-finish"
- assertVisible:
    text: "Welcome back"
    timeout: 10000
