# Verify the post-finish celebration screen renders after a completed workout.
appId: ${APP_ID:-host.exp.Exponent}
---
- launchApp

- tapOn:
    text: "Workout"
- tapOn:
    id: "workout-quick-start"

- tapOn:
    id: "active-workout-add-exercise"
- tapOn:
    id: "exercise-picker-search"
- inputText: "Bench"
- hideKeyboard:
    optional: true
- tapOn:
    id: "exercise-row-bench-press"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "exercise-picker-add"

# Log one set so the finish is not empty.
- assertVisible:
    id: "active-workout-finish"
- tapOn:
    id: "set-weight-we-\\d+-\\d+-0"
- eraseText: 5
- inputText: "60"
- hideKeyboard:
    optional: true
- tapOn:
    id: "set-reps-we-\\d+-\\d+-0"
- eraseText: 3
- inputText: "8"
- hideKeyboard:
    optional: true
- tapOn:
    id: "set-check-we-\\d+-\\d+-0"
    optional: true

- tapOn:
    id: "active-workout-finish"

- extendedWaitUntil:
    visible:
      text: "Great work"
    timeout: 15000
- assertVisible:
    id: "workout-complete-share"
- assertVisible:
    id: "workout-complete-done"
- tapOn:
    id: "workout-complete-done"
