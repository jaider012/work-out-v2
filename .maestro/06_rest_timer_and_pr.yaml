# Verify the rest timer pops up and PR detection labels a heavy set.
appId: ${APP_ID:-host.exp.Exponent}
---
- launchApp
- tapOn:
    text: "Workout"
- tapOn:
    id: "workout-quick-start"
- assertVisible:
    id: "active-workout-name"

# Add Bench Press
- tapOn:
    id: "active-workout-add-exercise"
- tapOn:
    id: "exercise-picker-search"
- inputText: "Bench"
- hideKeyboard
- tapOn:
    id: "exercise-row-bench-press"
- tapOn:
    id: "exercise-picker-add"

# Log a heavy set: 200 kg × 1 = 200 e1RM (likely a fresh PR)
- tapOn:
    id: "set-weight-${output.we ?? 'we-0'}-0"
    optional: true
- tapOn:
    text: "0"
    index: 0
- inputText: "200"
- hideKeyboard
- tapOn:
    text: "0"
    index: 0
- inputText: "1"
- hideKeyboard
- tapOn:
    id: "set-check-${output.we ?? 'we-0'}-0"
    optional: true

# Rest timer overlay should be visible
- assertVisible: "REST"
- tapOn:
    id: "rest-timer-stop"

# Finish and expect a PR alert
- tapOn:
    id: "active-workout-finish"
- extendedWaitUntil:
    visible:
      text: "personal record"
    timeout: 5000
    optional: true
