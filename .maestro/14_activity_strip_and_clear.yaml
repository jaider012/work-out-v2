# Activity strip visible on Home and Clear Data confirm.
appId: ${APP_ID:-host.exp.Exponent}
---
- launchApp

# Start and discard a workout to exercise the flow
- tapOn:
    text: "Workout"
- tapOn:
    id: "workout-quick-start"
- tapOn:
    id: "active-workout-add-exercise"
- tapOn:
    id: "exercise-picker-search"
- inputText: "Bench"
- hideKeyboard:
    optional: true
- tapOn:
    id: "exercise-row-bench-press"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "exercise-picker-add"

- tapOn:
    id: "active-workout-discard"
- tapOn:
    text: "Discard"
    optional: true

# Activity strip on Home
- tapOn:
    text: "Home"
- assertVisible: "YOUR FEED"

# Clear Data button surfaced under Danger Zone
- tapOn:
    text: "Profile"
- tapOn:
    text: "App Settings"
- assertVisible:
    id: "settings-clear-all"
