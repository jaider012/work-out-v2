# Creates a fresh test account. Pass EMAIL + PASSWORD via --env:
#   maestro test --env EMAIL=foo@x.test --env PASSWORD=TestAuto123 .maestro/00_sign_up.yaml
appId: com.jaider012.work-out-v2
---
- launchApp:
    clearState: true
- assertVisible:
    id: "welcome-get-started"
- tapOn:
    id: "welcome-get-started"
- assertVisible: "Create Account"
- tapOn:
    text: "Enter your email"
- inputText: ${EMAIL}
- hideKeyboard
- tapOn:
    text: "Create a password"
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    text: "Create Account"
    index: 1
# Dismiss iOS "Save Password?" system dialog if it appears.
- tapOn:
    text: "Not Now"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Welcome back"
    timeout: 20000
