# Cycle set type badges and verify the history calendar navigates month-by-month.
appId: ${APP_ID:-host.exp.Exponent}
---
- launchApp

# Start a quick workout and add an exercise.
- tapOn:
    text: "Workout"
- tapOn:
    id: "workout-quick-start"
- tapOn:
    id: "active-workout-add-exercise"
- tapOn:
    id: "exercise-picker-search"
- inputText: "Bench"
- hideKeyboard:
    optional: true
- tapOn:
    id: "exercise-row-bench-press"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "exercise-picker-add"

# Cycle the first set's type badge: N → W → F → D → N
- tapOn:
    id: "set-type-we-\\d+-\\d+-0"
    optional: true

- tapOn:
    id: "active-workout-discard"
- tapOn:
    text: "Discard"
    optional: true

# Navigate the history calendar
- tapOn:
    text: "History"
- assertVisible:
    id: "calendar-prev"
- tapOn:
    id: "calendar-prev"
- tapOn:
    id: "calendar-next"
